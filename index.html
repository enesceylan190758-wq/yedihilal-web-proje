<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YediHilal Sesli Asistan</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #1a472a 0%, #2d5a3d 100%); margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); text-align: center; max-width: 420px; width: 90%; }
        .logo { font-size: 48px; margin-bottom: 8px; }
        h1 { margin: 0 0 8px; color: #1a472a; font-size: 24px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
        .status { margin-bottom: 20px; font-weight: bold; color: #666; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #1a472a; color: white; border: none; border-radius: 8px; transition: 0.3s; width: 100%; }
        button:hover { background: #0f2e1a; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .active { color: #1a472a; }
        .error { color: #dc3545; }
        .info { margin-top: 20px; font-size: 12px; color: #888; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🌙</div>
        <h1>YediHilal Sesli Asistan</h1>
        <p class="subtitle">Yedi Tepeden Yedi Kıtaya</p>
        <div id="status" class="status">Aramaya Hazır</div>
        <button id="toggleBtn">Konuşmayı Başlat</button>
        <p class="info">Projelerimiz, başvuru süreçleri ve gönüllülük hakkında sorularınızı yanıtlayabilirim.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/retell-client-js-sdk@latest/dist/index.umd.js"></script>
    <script>
        const retellWebClient = new retell.RetellWebClient();
        const toggleBtn = document.getElementById('toggleBtn');
        const statusEl = document.getElementById('status');
        let isCalling = false;

        retellWebClient.on("call_started", () => {
            statusEl.textContent = "📞 Görüşme Sürüyor...";
            statusEl.className = "status active";
            toggleBtn.textContent = "Görüşmeyi Bitir";
            toggleBtn.style.background = "#dc3545";
        });

        retellWebClient.on("call_ended", () => {
            resetUI();
        });

        retellWebClient.on("error", (error) => {
            console.error("Error:", error);
            statusEl.textContent = "❌ Hata: " + error.message;
            statusEl.className = "status error";
            resetUI();
        });

        function resetUI() {
            statusEl.textContent = "Aramaya Hazır";
            statusEl.className = "status";
            toggleBtn.textContent = "Konuşmayı Başlat";
            toggleBtn.style.background = "#1a472a";
            toggleBtn.disabled = false;
            isCalling = false;
        }

        toggleBtn.addEventListener('click', async () => {
            if (isCalling) {
                retellWebClient.stopCall();
            } else {
                toggleBtn.disabled = true;
                statusEl.textContent = "Bağlanıyor...";

                try {
                    const response = await fetch("/register-call", { method: "POST" });
                    if (!response.ok) throw new Error("Token alınamadı");

                    const data = await response.json();
                    await retellWebClient.startCall({ accessToken: data.access_token });
                    isCalling = true;
                    toggleBtn.disabled = false;
                } catch (err) {
                    console.error(err);
                    statusEl.textContent = "Hata: Sunucuya bağlanılamadı";
                    statusEl.className = "status error";
                    toggleBtn.disabled = false;
                }
            }
        });
    </script>
</body>
</html>
